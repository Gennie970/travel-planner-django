<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>후쿠오카 여행</title>

<style>
body {
  font-family: Arial, Helvetica, sans-serif;
  background: #fffafc;
  margin: 0;
  padding: 20px;
}

h1 {
  text-align: center;
  color: #ff7aa2;
}

.page { display: none; }
.active { display: block; }

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  border-radius: 15px;
  overflow: hidden;
  table-layout: fixed;
}

th {
  background: #ffd6e0;
  padding: 10px;
  cursor: pointer;
  transition: all 0.2s ease;
}

th:first-child, td:first-child {
  width: 80px;
}

th:not(:first-child), td:not(:first-child) {
  width: calc((100% - 80px) / 3);
}

th:hover {
  background: #ffb6c9;
  transform: translateY(-2px);
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

td {
  padding: 10px;
  border-top: 1px solid #eee;
  word-break: break-word;
}

tr:nth-child(even) {
  background: #fff5f8;
}

.item {
  background: white;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 10px;
}

input {
  border: none;
  border-bottom: 2px solid #ffc0cb;
  background: transparent;
}

button {
  background: #ff9bb3;
  border: none;
  padding: 8px 14px;
  border-radius: 10px;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #ff7aa2;
}
</style>
</head>

<body>

<h1>✈️ 후쿠오카 여행 💗</h1>

<div id="main" class="page active"></div>
<div id="detail" class="page"></div>

<script>
const defaultData = {
  "2026-04-25": [
    { time:"10:00", text:"기상", cost:"" },
    { time:"15:35", text:"✈️출발 인천공항", cost:"504355" },
    { time:"17:00", text:"✈️도착 후쿠오카 공항", cost:"" },
    { time:"18:00", text:"🏯 APA Hotel Hakata Gion Station", cost:"438512" },
    { time:"18:30", text:"🍣 스시사카바 사시스 하카타마잉구점", cost:"" },
    { time:"19:30", text:"🛍️ 텐진", cost:"" },
    { time:"20:30", text:"🍢 나카스 야타이 거리", cost:"" },
    { time:"21:30", text:"🐙 츠키지긴타코", cost:"" },
    { time:"22:30", text:"🏯 APA Hotel Hakata Gion Station", cost:"" },
  ],
  "2026-04-26": [
    { time:"09:00", text:"🌿 오호리 공원", cost:"" },
    { time:"11:00", text:"🏯 후쿠오카 성터", cost:"" },
    { time:"12:30", text:"🍜 신신라멘 텐진본점", cost:"" },
    { time:"14:00", text:"🛍️ 캐널시티 하카타", cost:"" },
    { time:"16:00", text:"☕ さるーて", cost:"" },
    { time:"17:30", text:"🍱 쿄카라우나기 나카스", cost:"" },
    { time:"21:00", text:"🍱 우나기 욘다이메 키쿠가와 하루요시점", cost:"" }
  ],
  "2026-04-27": [
    { time:"07:00", text:"공항 이동", cost:"" },
    { time:"09:45", text:"✈️ 출발", cost:"" },
    { time:"11:15", text:"✈️ 도착", cost:"" }
  ]
};

if (!localStorage.getItem("trip")) {
  localStorage.setItem("trip", JSON.stringify(defaultData));
}

let data = JSON.parse(localStorage.getItem("trip"));

function save() {
  localStorage.setItem("trip", JSON.stringify(data));
}

function goMain() {
  document.getElementById("main").classList.add("active");
  document.getElementById("detail").classList.remove("active");
  renderMain();
}

function goDetail(date) {
  document.getElementById("main").classList.remove("active");
  document.getElementById("detail").classList.add("active");
  renderDetail(date);
}

function openMap(place) {
  const url = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(place);
  window.open(url, "_blank");
}

function renderMain() {
  let dates = Object.keys(data);
  let times = new Set();

  dates.forEach(d => {
    data[d].forEach(i => times.add(i.time));
  });

  times = Array.from(times).sort();

  let total = 0;

  let html = "<h2>📅 전체 일정표</h2><table>";
  html += "<tr><th>시간</th>";

  dates.forEach(d => {
    html += `<th onclick="goDetail('${d}')">${d}</th>`;
  });

  html += "</tr>";

  times.forEach(t => {
    html += `<tr><td>${t}</td>`;

    dates.forEach(d => {
      const item = data[d].find(i => i.time === t);

      if (item && item.cost) {
        total += Number(item.cost) || 0;
      }

      html += `<td>
        ${item ? `
          <span onclick="openMap('${item.text}')" style="cursor:pointer; color:#ff7aa2;">
            ${item.text}
          </span><br>
          <small style="color:#999;">
            ${item.cost ? "💰 " + Number(item.cost).toLocaleString() + "원" : ""}
          </small>
        ` : "-"}
      </td>`;
    });

    html += "</tr>";
  });

  html += "</table>";

  html += `
    <h3 style="text-align:center; margin-top:20px;">
      💸 총 비용: ${total.toLocaleString()} 원
    </h3>
  `;

  document.getElementById("main").innerHTML = html;
}

function renderDetail(date) {
  let html = `<button onclick="goMain()">⬅ 돌아가기</button><h2>${date}</h2>`;

  data[date].forEach((item, i) => {
    html += `
      <div class="item">
        ⏰ <input value="${item.time}" onchange="update('${date}',${i},'time',this.value)"><br>
        ✏️ <input value="${item.text}" onchange="update('${date}',${i},'text',this.value)"><br>
        💰 <input value="${item.cost}" onchange="update('${date}',${i},'cost',this.value)">
      </div>
    `;
  });

  html += `<button onclick="addItem('${date}')">+ 일정 추가</button>`;

  document.getElementById("detail").innerHTML = html;
}

function update(date, i, key, val) {
  data[date][i][key] = val;
  save();
  renderMain();
}

function addItem(date) {
  data[date].push({ time:"", text:"", cost:"" });
  save();
  renderDetail(date);
}

renderMain();
</script>

</body>
</html>
